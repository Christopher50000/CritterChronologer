# Server port is arbitrary
server.port=8082
spring.h2.console.settings.web-allow-others=true

debug=true
# Data Source Setup
spring.datasource.username=user
spring.datasource.password=userpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3307/mydb

# Database initialization configuration
#  Always run data.sql/schema.sql scripts if they exist
spring.sql.init.mode=always
# ddl-auto=create-drop: Hibernate schema generation strategy
# create-drop: Create schema on startup and drop it on shutdown
# though create-drop will delete all data when application stops
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=DEBUG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
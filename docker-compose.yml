version: '3.8'

services:
  db:
    image: mysql:8.1
    container_name: my_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    ports:
      - "3307:3306"          # Expose MySQL port to host
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: